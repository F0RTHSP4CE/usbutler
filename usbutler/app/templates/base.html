<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}USButler{% endblock %}</title>
    <style>
        body {
            font-family: monospace;
            max-width: 1100px;
            margin: 0 auto;
            padding: 1rem;
            font-size: 0.9rem;
        }

        nav {
            margin-bottom: 1rem;
        }

        nav a {
            margin-right: 1rem;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 0.4rem 0.6rem;
            text-align: left;
            vertical-align: middle;
            white-space: nowrap;
        }

        th {
            background: #f5f5f5;
        }

        td.wrap {
            white-space: normal;
        }

        input,
        select,
        button {
            font-family: monospace;
            font-size: 0.85rem;
        }

        .section {
            margin: 1.5rem 0;
            padding: 1rem;
            border: 1px solid #ccc;
        }

        .form-row {
            margin: 0.5rem 0;
        }

        .alert {
            padding: 0.5rem;
            margin: 0.5rem 0;
            border: 1px solid #000;
        }

        .token-box {
            font-size: 0.75rem;
            word-break: break-all;
            white-space: normal;
            background: #ffe;
            border: 1px dashed #aa0;
            padding: 0.3rem;
            margin: 0.3rem 0;
            cursor: pointer;
            max-width: 200px;
        }

        .inline-group {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .cidr-input {
            width: 10rem;
        }

        .token-indicator {
            color: #090;
            font-weight: bold;
        }

        .no-token {
            color: #999;
        }

        .ident-item {
            display: block;
            line-height: 1.8;
        }
    </style>
</head>

<body>
    <h1>USButler</h1>
    <nav>
        <a href="/">[Users]</a>
        <a href="/doors">[Doors]</a>
        {% if auth_enabled %}
        <a href="/logout" style="float: right;">[Logout]</a>
        {% endif %}
    </nav>
    <hr>
    <div id="alerts"></div>
    {% block content %}{% endblock %}
    <script>
        const API = '/api';
        function getApiKey() {
            const match = document.cookie.match(/(?:^|; )api_key=([^;]*)/);
            return match ? decodeURIComponent(match[1]) : null;
        }
        async function api(method, endpoint, data = null) {
            const headers = { 'Content-Type': 'application/json' };
            const apiKey = getApiKey();
            if (apiKey) headers['X-API-Key'] = apiKey;
            const opts = { method, headers };
            if (data) opts.body = JSON.stringify(data);
            const res = await fetch(API + endpoint, opts);
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || 'Request failed');
            }
            return res.status === 204 ? null : res.json();
        }
        function showAlert(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'alert';
            div.textContent = (type === 'danger' ? '❌ ' : '✓ ') + msg;
            document.getElementById('alerts').appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
