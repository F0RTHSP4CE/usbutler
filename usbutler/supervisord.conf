[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:pcscd]
command=/usr/sbin/pcscd --foreground --debug --apdu --color --disable-polkit
user=root
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/pcscd.err.log
stdout_logfile=/var/log/supervisor/pcscd.out.log
priority=100

[program:udev-monitor]
command=/app/scripts/udev_monitor.sh
user=root
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/udev.err.log
stdout_logfile=/var/log/supervisor/udev.out.log
priority=50

[program:usbutler]
command=/app/.venv/bin/python /app/app/cli.py --combined
directory=/app
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
environment=PYTHONUNBUFFERED=1,PYTHONPATH=/app