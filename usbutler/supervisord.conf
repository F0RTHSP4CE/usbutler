[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[program:pcscd]
command=/usr/sbin/pcscd --foreground --debug --apdu --color --disable-polkit
user=root
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/pcscd.err.log
stdout_logfile=/var/log/supervisor/pcscd.out.log
priority=100

[program:udev-monitor]
command=/app/scripts/udev_monitor.sh
user=root
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/udev.err.log
stdout_logfile=/var/log/supervisor/udev.out.log
priority=50

[program:usbutler]
command=/app/.venv/bin/python -m app.cli
directory=/app
user=appuser
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/usbutler.err.log
stdout_logfile=/var/log/supervisor/usbutler.out.log
environment=PATH="/app/.venv/bin:%(ENV_PATH)s"
priority=200
